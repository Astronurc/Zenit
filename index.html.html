<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>ZENIT — Casa de la Moneda</title>
<meta name="theme-color" content="#0A0A0F">
<script src="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@400;500;600;700&display=swap');

  :root{
    --zen-bg:#07070B;
    --zen-bg2:#0D0D14;
    --zen-card:#121219;
    --zen-card2:#16161F;
    --zen-purple:#A855F7;
    --zen-purple-glow:#C084FC;
    --zen-cyan:#22D3EE;
    --zen-cyan-glow:#67E8F9;
    --zen-gold:#F0B433;
    --zen-gold-glow:#FFD15C;
    --zen-bronze:#B87333;
    --zen-silver:#C9CBCF;
    --zen-red:#EF4444;
    --zen-line:rgba(255,255,255,0.08);
    --zen-line-strong:rgba(255,255,255,0.14);
    --zen-text:#F4F4F7;
    --zen-text-dim:#9A9AA8;
    --zen-text-faint:#5C5C68;
  }
  *{box-sizing:border-box;}
  html,body{
    background:var(--zen-bg);
    color:var(--zen-text);
    font-family:'Rajdhani',sans-serif;
    margin:0;padding:0;
    overflow-x:hidden;
    -webkit-tap-highlight-color:transparent;
    min-height:100vh;
  }
  body{
    background-image:
      radial-gradient(circle at 15% 10%, rgba(168,85,247,0.10) 0%, transparent 45%),
      radial-gradient(circle at 85% 15%, rgba(34,211,238,0.10) 0%, transparent 45%),
      radial-gradient(circle at 50% 90%, rgba(240,180,51,0.06) 0%, transparent 50%),
      linear-gradient(180deg, #07070B 0%, #0A0A12 100%);
    background-attachment:fixed;
  }
  .font-display{font-family:'Orbitron',sans-serif;}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(168,85,247,0.4);border-radius:3px;}

  .glass-card{
    background:linear-gradient(165deg, rgba(255,255,255,0.045) 0%, rgba(255,255,255,0.015) 100%), var(--zen-card);
    border:1px solid var(--zen-line);
    border-radius:16px;
    position:relative;
    overflow:hidden;
  }
  .glass-card::before{
    content:'';
    position:absolute;inset:0;
    background:linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.03) 50%, transparent 100%);
    pointer-events:none;
  }
  .neon-border-purple{ box-shadow:0 0 0 1px rgba(168,85,247,0.35), 0 0 24px -4px rgba(168,85,247,0.35); border-color:rgba(168,85,247,0.5)!important; }
  .neon-border-cyan{ box-shadow:0 0 0 1px rgba(34,211,238,0.35), 0 0 24px -4px rgba(34,211,238,0.35); border-color:rgba(34,211,238,0.5)!important; }
  .neon-border-gold{ box-shadow:0 0 0 1px rgba(240,180,51,0.4), 0 0 24px -4px rgba(240,180,51,0.4); border-color:rgba(240,180,51,0.55)!important; }
  .neon-border-red{ box-shadow:0 0 0 1px rgba(239,68,68,0.4), 0 0 24px -4px rgba(239,68,68,0.45); border-color:rgba(239,68,68,0.55)!important; }

  .text-glow-purple{ text-shadow:0 0 12px rgba(168,85,247,0.7), 0 0 28px rgba(168,85,247,0.3); }
  .text-glow-cyan{ text-shadow:0 0 12px rgba(34,211,238,0.7), 0 0 28px rgba(34,211,238,0.3); }
  .text-glow-gold{ text-shadow:0 0 12px rgba(240,180,51,0.7), 0 0 28px rgba(240,180,51,0.3); }

  .btn-zenit{
    font-family:'Orbitron',sans-serif;
    font-weight:700;
    letter-spacing:0.04em;
    font-size:12px;
    text-transform:uppercase;
    padding:12px 20px;
    border-radius:10px;
    border:1px solid var(--zen-line-strong);
    background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
    color:var(--zen-text);
    transition:all 0.18s ease;
    cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
  }
  .btn-zenit:active{ transform:scale(0.97); }
  .btn-zenit:disabled{ opacity:0.35; cursor:not-allowed; }
  .btn-purple{ border-color:rgba(168,85,247,0.55); color:var(--zen-purple-glow); box-shadow:0 0 18px -6px rgba(168,85,247,0.6); }
  .btn-purple:not(:disabled):hover{ background:rgba(168,85,247,0.14); box-shadow:0 0 22px -4px rgba(168,85,247,0.8); }
  .btn-cyan{ border-color:rgba(34,211,238,0.55); color:var(--zen-cyan-glow); box-shadow:0 0 18px -6px rgba(34,211,238,0.6); }
  .btn-cyan:not(:disabled):hover{ background:rgba(34,211,238,0.14); box-shadow:0 0 22px -4px rgba(34,211,238,0.8); }
  .btn-gold{ border-color:rgba(240,180,51,0.6); color:var(--zen-gold-glow); box-shadow:0 0 18px -6px rgba(240,180,51,0.6); }
  .btn-gold:not(:disabled):hover{ background:rgba(240,180,51,0.14); box-shadow:0 0 22px -4px rgba(240,180,51,0.8); }
  .btn-red{ border-color:rgba(239,68,68,0.6); color:#FCA5A5; box-shadow:0 0 18px -6px rgba(239,68,68,0.6); }
  .btn-red:not(:disabled):hover{ background:rgba(239,68,68,0.14); }
  .btn-ghost{ background:transparent; border-color:var(--zen-line); color:var(--zen-text-dim); box-shadow:none; }
  .btn-ghost:hover{ border-color:var(--zen-line-strong); color:var(--zen-text); }

  .coin-img{
    width:44px;height:44px;object-fit:contain;
    filter:drop-shadow(0 0 6px rgba(0,0,0,0.5));
    image-rendering:-webkit-optimize-contrast;
  }
  .coin-img-lg{ width:84px;height:84px; }
  .coin-img-sm{ width:28px;height:28px; }

  .hex-clip{
    clip-path:polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
  }

  .scanline-bar{
    height:3px;width:100%;
    background:linear-gradient(90deg, transparent, var(--zen-purple), var(--zen-cyan), transparent);
    opacity:0.5;
  }

  .input-zenit{
    background:rgba(255,255,255,0.04);
    border:1px solid var(--zen-line);
    border-radius:10px;
    padding:10px 14px;
    color:var(--zen-text);
    font-family:'Rajdhani',sans-serif;
    font-weight:500;
    outline:none;
    transition:border-color 0.15s;
  }
  .input-zenit:focus{ border-color:var(--zen-purple); box-shadow:0 0 0 3px rgba(168,85,247,0.15); }
  .input-zenit::placeholder{ color:var(--zen-text-faint); }

  .progress-track{
    height:8px;border-radius:6px;
    background:rgba(255,255,255,0.06);
    overflow:hidden;
    border:1px solid var(--zen-line);
  }
  .progress-fill{
    height:100%;border-radius:6px;
    transition:width 0.5s cubic-bezier(.4,0,.2,1);
  }

  .tab-zenit{
    font-family:'Orbitron',sans-serif;
    font-size:11px;
    font-weight:700;
    letter-spacing:0.05em;
    text-transform:uppercase;
    padding:10px 14px;
    border-radius:10px 10px 0 0;
    color:var(--zen-text-faint);
    border-bottom:2px solid transparent;
    cursor:pointer;
    white-space:nowrap;
    transition:all 0.15s;
  }
  .tab-zenit.active{ color:var(--zen-purple-glow); border-bottom-color:var(--zen-purple); background:rgba(168,85,247,0.06); }

  .badge-rank{
    font-family:'Orbitron',sans-serif;
    font-size:10px;font-weight:700;letter-spacing:0.04em;
    padding:3px 10px;border-radius:20px;text-transform:uppercase;
  }
  .badge-bronze{ background:rgba(184,115,51,0.18); color:#D89B5E; border:1px solid rgba(184,115,51,0.45); }
  .badge-silver{ background:rgba(201,203,207,0.15); color:#D5D7DB; border:1px solid rgba(201,203,207,0.4); }
  .badge-gold{ background:rgba(240,180,51,0.18); color:var(--zen-gold-glow); border:1px solid rgba(240,180,51,0.5); }

  .mission-row{
    background:rgba(255,255,255,0.025);
    border:1px solid var(--zen-line);
    border-radius:12px;
    padding:12px 14px;
    transition:all 0.15s;
    cursor:pointer;
  }
  .mission-row:active{ transform:scale(0.985); }
  .mission-row.done{ opacity:0.45; }
  .mission-row.done .mission-text{ text-decoration:line-through; }

  .checkbox-zenit{
    width:24px;height:24px;border-radius:7px;
    border:2px solid var(--zen-line-strong);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    transition:all 0.15s;
  }
  .checkbox-zenit.checked{ background:var(--zen-purple); border-color:var(--zen-purple); box-shadow:0 0 12px -2px var(--zen-purple); }

  .toast-zenit{
    font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;
    padding:14px 18px;border-radius:12px;
    border:1px solid var(--zen-line-strong);
    background:var(--zen-card2);
    backdrop-filter:blur(12px);
    animation:toastIn 0.25s cubic-bezier(.34,1.56,.64,1);
    min-width:240px;
    display:flex;align-items:center;gap:10px;
  }
  @keyframes toastIn{ from{ transform:translateX(120%); opacity:0; } to{ transform:translateX(0); opacity:1; } }

  .modal-overlay{
    position:fixed;inset:0;z-index:200;
    background:rgba(4,4,8,0.88);
    backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;
    padding:16px;
  }

  .faction-card{
    border:2px solid var(--zen-line);
    border-radius:16px;
    padding:18px;
    cursor:pointer;
    transition:all 0.2s;
    background:rgba(255,255,255,0.02);
  }
  .faction-card.selected{ border-color:var(--zen-purple); box-shadow:0 0 24px -4px rgba(168,85,247,0.6); background:rgba(168,85,247,0.06); }

  .grid-pattern{
    background-image:
      linear-gradient(rgba(168,85,247,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(168,85,247,0.06) 1px, transparent 1px);
    background-size:32px 32px;
  }

  .pulse-dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--zen-cyan);
    box-shadow:0 0 8px var(--zen-cyan);
    animation:pulseDot 1.6s ease-in-out infinite;
  }
  @keyframes pulseDot{ 0%,100%{ opacity:1; } 50%{ opacity:0.35; } }

  .stat-bar-wrap{ display:flex;flex-direction:column;gap:4px; }
  .calendar-day{
    aspect-ratio:1;border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:600;
    border:1px solid transparent;
    cursor:pointer;
    position:relative;
  }
  .calendar-day:hover{ background:rgba(255,255,255,0.04); }
  .calendar-day.today{ border-color:var(--zen-cyan); color:var(--zen-cyan-glow); }
  .calendar-day.has-event::after{
    content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);
    width:4px;height:4px;border-radius:50%;background:var(--zen-purple);
  }
  .calendar-day.selected{ background:rgba(168,85,247,0.25); border-color:var(--zen-purple); }

  .skeleton-shimmer{
    background:linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 37%, rgba(255,255,255,0.03) 63%);
    background-size:400% 100%;
    animation:shimmer 1.4s ease infinite;
  }
  @keyframes shimmer{ 0%{ background-position:100% 50%; } 100%{ background-position:0 50%; } }

  .fadeUp{ animation:fadeUp 0.35s ease both; }
  @keyframes fadeUp{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }
</style>
</head>

const { createClient } = supabase;
const sb = createClient(ZENIT_CONFIG.SUPABASE_URL, ZENIT_CONFIG.SUPABASE_ANON_KEY);

const STATE = {
  session: null,
  perfil: null,
  tareas: [],
  vista: "dashboard",
  loading: true,
  assetsReady: false,
  assetsUrls: { logo: "", coin_bronze: "", coin_silver: "", coin_gold: "" },
  rescueMode: false,
  calendarMonth: new Date().getMonth(),
  calendarYear: new Date().getFullYear(),
  calendarSelected: null,
  calendarEvents: JSON.parse(localStorage.getItem("zenit_calendar_events") || "{}"),
  googleCalendarConnected: false
};

function toast(msg, type = "info", icon = "ti-bolt") {
  const colors = {
    success: { border: "rgba(34,211,238,0.5)", text: "#67E8F9" },
    danger: { border: "rgba(239,68,68,0.5)", text: "#FCA5A5" },
    warning: { border: "rgba(240,180,51,0.55)", text: "#FFD15C" },
    info: { border: "rgba(168,85,247,0.5)", text: "#C084FC" }
  };
  const c = colors[type] || colors.info;
  const el = document.createElement("div");
  el.className = "toast-zenit";
  el.style.borderColor = c.border;
  el.innerHTML = `<i class="ti ${icon}" style="color:${c.text};font-size:18px"></i><span style="color:${c.text}">${msg}</span>`;
  document.getElementById("toast-container").appendChild(el);
  setTimeout(() => {
    el.style.transition = "all 0.3s ease";
    el.style.opacity = "0";
    el.style.transform = "translateX(120%)";
    setTimeout(() => el.remove(), 300);
  }, 3200);
}

function valorCartera(perfil) {
  if (!perfil) return 0;
  return (perfil.coin_gold || 0) * 5 + (perfil.coin_silver || 0) * 3 + (perfil.coin_bronze || 0) * 1;
}

function hoyISO() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}

function nivelMulta(dias) {
  if (dias >= 5) return { nombre: "BANCARROTA", color: "red", mult: 2.0 };
  if (dias >= 3) return { nombre: "GRAVE", color: "red", mult: 1.0 + ZENIT_CONFIG.INFLACION_PORC_AUTO };
  if (dias >= 1) return { nombre: "LEVE", color: "gold", mult: 1.0 + (ZENIT_CONFIG.INFLACION_PORC_AUTO / 2) };
  return { nombre: "LIMPIO", color: "cyan", mult: 1.0 };
}

function precioConInflacion(base) {
  const perfil = STATE.perfil;
  if (!perfil) return base;
  let mult = 1.0;
  const multa = nivelMulta(perfil.multa_dias || 0);
  mult *= multa.mult;
  if (perfil.inflacion_activa) {
    mult *= (1 + ZENIT_CONFIG.INFLACION_PORC_LIBRE);
  }
  return Math.ceil(base * mult);
}

async function ensureAssetsUploaded() {
  const cached = localStorage.getItem("zenit_assets_urls");
  if (cached) {
    STATE.assetsUrls = JSON.parse(cached);
    STATE.assetsReady = true;
    return;
  }
  try {
    const entries = Object.entries(ZENIT_ASSETS_B64);
    const urls = {};
    for (const [key, b64] of entries) {
      const filename = `${key}.png`;
      const byteChars = atob(b64);
      const byteNumbers = new Array(byteChars.length);
      for (let i = 0; i < byteChars.length; i++) byteNumbers[i] = byteChars.charCodeAt(i);
      const byteArray = new Uint8Array(byteNumbers);
      const blob = new Blob([byteArray], { type: "image/png" });

      const { error } = await sb.storage
        .from(ZENIT_CONFIG.STORAGE_BUCKET)
        .upload(filename, blob, { contentType: "image/png", upsert: true });

      if (error) {
        console.warn("Upload asset error", key, error.message);
        urls[key] = null;
        continue;
      }
      const { data } = sb.storage.from(ZENIT_CONFIG.STORAGE_BUCKET).getPublicUrl(filename);
      urls[key] = data.publicUrl;
    }
    STATE.assetsUrls = urls;
    STATE.assetsReady = true;
    localStorage.setItem("zenit_assets_urls", JSON.stringify(urls));
  } catch (e) {
    console.warn("ensureAssetsUploaded failed, using inline fallback", e);
    STATE.assetsUrls = {
      logo: `data:image/png;base64,${ZENIT_ASSETS_B64.logo}`,
      coin_bronze: `data:image/png;base64,${ZENIT_ASSETS_B64.coin_bronze}`,
      coin_silver: `data:image/png;base64,${ZENIT_ASSETS_B64.coin_silver}`,
      coin_gold: `data:image/png;base64,${ZENIT_ASSETS_B64.coin_gold}`
    };
    STATE.assetsReady = true;
  }
}

function coinSrc(tipo) {
  return STATE.assetsUrls[tipo] || `data:image/png;base64,${ZENIT_ASSETS_B64[tipo]}`;
}
function logoSrc() {
  return STATE.assetsUrls.logo || `data:image/png;base64,${ZENIT_ASSETS_B64.logo}`;
}

async function loginWithGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: "google",
    options: { redirectTo: window.location.href }
  });
  if (error) toast("Error de login: " + error.message, "danger", "ti-alert-triangle");
}

async function logout() {
  await sb.auth.signOut();
  STATE.session = null;
  STATE.perfil = null;
  render();
}

async function cargarPerfil() {
  const userId = STATE.session.user.id;
  const { data, error } = await sb
    .from("perfil_usuario")
    .select("*")
    .eq("user_id", userId)
    .maybeSingle();

  if (error) {
    console.warn("Error cargando perfil", error.message);
    toast("No se pudo cargar el perfil", "danger", "ti-alert-triangle");
    return null;
  }
  return data;
}

async function crearPerfil(nickname, faccion) {
  const userId = STATE.session.user.id;
  const { data, error } = await sb
    .from("perfil_usuario")
    .insert({
      user_id: userId,
      nickname,
      faccion,
      avatar_url: STATE.session.user.user_metadata?.avatar_url || null,
      coin_bronze: 0,
      coin_silver: 0,
      coin_gold: 0,
      banco: 0,
      multa_dias: 0,
      racha_dias: 0,
      inflacion_activa: false,
      ultimo_cierre_jornada: null
    })
    .select()
    .single();

  if (error) {
    toast("Error creando personaje: " + error.message, "danger", "ti-alert-triangle");
    return null;
  }
  return data;
}

async function actualizarPerfil(campos) {
  const userId = STATE.session.user.id;
  const { data, error } = await sb
    .from("perfil_usuario")
    .update(campos)
    .eq("user_id", userId)
    .select()
    .single();

  if (error) {
    toast("Error guardando: " + error.message, "danger", "ti-alert-triangle");
    return null;
  }
  STATE.perfil = data;
  return data;
}

async function cargarTareasHoy() {
  const userId = STATE.session.user.id;
  const { data, error } = await sb
    .from("tareas")
    .select("*")
    .eq("user_id", userId)
    .eq("fecha", hoyISO())
    .order("created_at", { ascending: true });

  if (error) {
    console.warn("Error cargando tareas", error.message);
    return [];
  }
  return data || [];
}

async function crearTarea(texto, rango, categoria) {
  const userId = STATE.session.user.id;
  const { data, error } = await sb
    .from("tareas")
    .insert({ user_id: userId, texto, rango, categoria, completada: false, fecha: hoyISO() })
    .select()
    .single();

  if (error) {
    toast("Error creando tarea: " + error.message, "danger", "ti-alert-triangle");
    return null;
  }
  STATE.tareas.push(data);
  return data;
}

async function completarTarea(tarea) {
  if (tarea.completada) return;

  const { error } = await sb
    .from("tareas")
    .update({ completada: true })
    .eq("id", tarea.id);

  if (error) {
    toast("Error al completar: " + error.message, "danger", "ti-alert-triangle");
    return;
  }

  tarea.completada = true;

  const campo = tarea.rango === "bronce" ? "coin_bronze" : tarea.rango === "plata" ? "coin_silver" : "coin_gold";
  const nuevoValor = (STATE.perfil[campo] || 0) + 1;
  const updates = { [campo]: nuevoValor };

  const perfilActualizado = await actualizarPerfil(updates);
  if (perfilActualizado) {
    STATE.perfil = perfilActualizado;
    recalcularInflacionLibre();
    toast(`+1 moneda ${tarea.rango} obtenida`, "success", "ti-coin");
  }
  render();
}

function recalcularInflacionLibre() {
  const libre = (STATE.perfil.coin_bronze || 0) * 1 + (STATE.perfil.coin_silver || 0) * 3 + (STATE.perfil.coin_gold || 0) * 5;
  const activa = libre > ZENIT_CONFIG.INFLACION_LIMITE_LIBRE;
  if (activa !== STATE.perfil.inflacion_activa) {
    actualizarPerfil({ inflacion_activa: activa });
  }
}

async function cerrarJornada() {
  const tareasHoy = STATE.tareas.filter(t => t.fecha === hoyISO());
  const ganoPlataOOro = tareasHoy.some(t => t.completada && (t.rango === "plata" || t.rango === "oro"));

  let nuevaMulta = STATE.perfil.multa_dias || 0;
  let nuevaRacha = STATE.perfil.racha_dias || 0;

  if (!ganoPlataOOro) {
    nuevaMulta += 1;
    nuevaRacha = 0;
    toast(`Día vago detectado. Multa: ${nuevaMulta} día(s) de inflación`, "danger", "ti-alert-octagon");
  } else {
    nuevaMulta = 0;
    nuevaRacha += 1;
    toast("Jornada cerrada con éxito. Sin penalización", "success", "ti-check");
  }

  await actualizarPerfil({
    multa_dias: nuevaMulta,
    racha_dias: nuevaRacha,
    ultimo_cierre_jornada: hoyISO()
  });

  STATE.tareas = await cargarTareasHoy();
  render();
}

async function depositarBanco(cantidad) {
  if (cantidad <= 0) { toast("Cantidad inválida", "warning", "ti-alert-triangle"); return; }
  const valorLibre = (STATE.perfil.coin_bronze || 0) * 1 + (STATE.perfil.coin_silver || 0) * 3 + (STATE.perfil.coin_gold || 0) * 5;
  if (cantidad > valorLibre) { toast("No tienes esos puntos en la cartera", "warning", "ti-alert-triangle"); return; }

  let restante = cantidad;
  let bronce = STATE.perfil.coin_bronze || 0;
  let plata = STATE.perfil.coin_silver || 0;
  let oro = STATE.perfil.coin_gold || 0;

  while (restante > 0 && bronce > 0) { bronce--; restante--; }
  while (restante >= 3 && plata > 0) { plata--; restante -= 3; }
  while (restante >= 5 && oro > 0) { oro--; restante -= 5; }
  while (restante > 0 && plata > 0) { plata--; restante -= 3; }
  while (restante > 0 && oro > 0) { oro--; restante -= 5; }

  const nuevoBanco = (STATE.perfil.banco || 0) + cantidad;

  await actualizarPerfil({
    coin_bronze: Math.max(0, bronce),
    coin_silver: Math.max(0, plata),
    coin_gold: Math.max(0, oro),
    banco: nuevoBanco
  });
  recalcularInflacionLibre();
  toast(`${cantidad} pts depositados en la hucha blindada`, "success", "ti-building-bank");
  render();
}

async function retirarBanco(cantidad) {
  if (cantidad <= 0) { toast("Cantidad inválida", "warning", "ti-alert-triangle"); return; }
  if (cantidad > (STATE.perfil.banco || 0)) { toast("No tienes ese saldo en el banco", "warning", "ti-alert-triangle"); return; }

  const nuevoBanco = (STATE.perfil.banco || 0) - cantidad;
  const nuevoBronce = (STATE.perfil.coin_bronze || 0) + cantidad;

  await actualizarPerfil({
    banco: nuevoBanco,
    coin_bronze: nuevoBronce
  });
  recalcularInflacionLibre();
  toast(`${cantidad} pts retirados a la cartera en bronce`, "info", "ti-building-bank");
  render();
}

async function forjarMoneda(tipo) {
  const p = STATE.perfil;
  if (tipo === "bronce_a_plata") {
    if ((p.coin_bronze || 0) < ZENIT_CONFIG.COSTE_FORJA_BRONCE_A_PLATA) {
      toast(`Necesitas ${ZENIT_CONFIG.COSTE_FORJA_BRONCE_A_PLATA} bronces`, "warning", "ti-alert-triangle"); return;
    }
    await actualizarPerfil({
      coin_bronze: p.coin_bronze - ZENIT_CONFIG.COSTE_FORJA_BRONCE_A_PLATA,
      coin_silver: (p.coin_silver || 0) + 1
    });
    toast("Forjado: 1 moneda de plata", "success", "ti-sparkles");
  } else if (tipo === "bronce_a_oro") {
    if ((p.coin_bronze || 0) < ZENIT_CONFIG.COSTE_FORJA_BRONCE_A_ORO) {
      toast(`Necesitas ${ZENIT_CONFIG.COSTE_FORJA_BRONCE_A_ORO} bronces`, "warning", "ti-alert-triangle"); return;
    }
    await actualizarPerfil({
      coin_bronze: p.coin_bronze - ZENIT_CONFIG.COSTE_FORJA_BRONCE_A_ORO,
      coin_gold: (p.coin_gold || 0) + 1
    });
    toast("Forjado: 1 moneda de oro", "success", "ti-sparkles");
  } else if (tipo === "plata_a_oro") {
    if ((p.coin_silver || 0) < ZENIT_CONFIG.COSTE_FORJA_PLATA_A_ORO) {
      toast(`Necesitas ${ZENIT_CONFIG.COSTE_FORJA_PLATA_A_ORO} platas`, "warning", "ti-alert-triangle"); return;
    }
    await actualizarPerfil({
      coin_silver: p.coin_silver - ZENIT_CONFIG.COSTE_FORJA_PLATA_A_ORO,
      coin_gold: (p.coin_gold || 0) + 1
    });
    toast("Forjado: 1 moneda de oro", "success", "ti-sparkles");
  }
  recalcularInflacionLibre();
  render();
}

async function fraccionarMoneda(tipo) {
  const p = STATE.perfil;
  if (tipo === "oro_a_bronce") {
    if ((p.coin_gold || 0) < 1) { toast("No tienes oro disponible", "warning", "ti-alert-triangle"); return; }
    await actualizarPerfil({ coin_gold: p.coin_gold - 1, coin_bronze: (p.coin_bronze || 0) + 5 });
    toast("Fraccionado: 5 monedas de bronce", "info", "ti-cut");
  } else if (tipo === "plata_a_bronce") {
    if ((p.coin_silver || 0) < 1) { toast("No tienes plata disponible", "warning", "ti-alert-triangle"); return; }
    await actualizarPerfil({ coin_silver: p.coin_silver - 1, coin_bronze: (p.coin_bronze || 0) + 3 });
    toast("Fraccionado: 3 monedas de bronce", "info", "ti-cut");
  } else if (tipo === "oro_a_plata") {
    if ((p.coin_gold || 0) < 1) { toast("No tienes oro disponible", "warning", "ti-alert-triangle"); return; }
    await actualizarPerfil({ coin_gold: p.coin_gold - 1, coin_silver: (p.coin_silver || 0) + 1, coin_bronze: (p.coin_bronze || 0) + 2 });
    toast("Fraccionado: 1 plata + 2 bronce", "info", "ti-cut");
  }
  recalcularInflacionLibre();
  render();
}

async function comprarRecompensa(item) {
  const precioFinal = precioConInflacion(item.base);
  const p = STATE.perfil;
  const valorCarteraLibre = (p.coin_bronze || 0) * 1 + (p.coin_silver || 0) * 3 + (p.coin_gold || 0) * 5;

  if (STATE.bancarrota) {
    toast("Tienda bloqueada por bancarrota. Resuelve tu deuda primero", "danger", "ti-lock");
    return;
  }

  if (valorCarteraLibre < precioFinal) {
    const faltante = precioFinal - valorCarteraLibre;
    if ((p.banco || 0) >= faltante) {
      toast(`Te faltan ${faltante} pts en cartera. Retira del banco primero`, "warning", "ti-building-bank");
    } else {
      toast(`No tienes suficiente. Necesitas ${precioFinal} pts en total`, "warning", "ti-alert-triangle");
    }
    return;
  }

  let restante = precioFinal;
  let bronce = p.coin_bronze || 0;
  let plata = p.coin_silver || 0;
  let oro = p.coin_gold || 0;

  while (restante > 0 && bronce > 0) { bronce--; restante--; }
  while (restante >= 3 && plata > 0) { plata--; restante -= 3; }
  while (restante >= 5 && oro > 0) { oro--; restante -= 5; }
  while (restante > 0 && plata > 0) { plata--; restante -= 3; }
  while (restante > 0 && oro > 0) { oro--; restante -= 5; }

  await actualizarPerfil({
    coin_bronze: Math.max(0, bronce),
    coin_silver: Math.max(0, plata),
    coin_gold: Math.max(0, oro)
  });
  recalcularInflacionLibre();
  toast(`Canjeado: ${item.nombre} (−${precioFinal} pts)`, "success", "ti-shopping-cart");
  render();
}

function eventKey(y, m, d) {
  return `${y}-${String(m + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
}

function addCalendarEvent(key, titulo, hora) {
  if (!STATE.calendarEvents[key]) STATE.calendarEvents[key] = [];
  STATE.calendarEvents[key].push({ id: Date.now(), titulo, hora, syncedGoogle: false });
  localStorage.setItem("zenit_calendar_events", JSON.stringify(STATE.calendarEvents));
  toast("Evento añadido al calendario", "success", "ti-calendar-check");
  render();
}

function deleteCalendarEvent(key, id) {
  if (!STATE.calendarEvents[key]) return;
  STATE.calendarEvents[key] = STATE.calendarEvents[key].filter(e => e.id !== id);
  localStorage.setItem("zenit_calendar_events", JSON.stringify(STATE.calendarEvents));
  render();
}

        <p class="font-display text-xl" style="color:${multa.color === 'red' ? '#FCA5A5' : multa.color === 'gold' ? 'var(--zen-gold-glow)' : 'var(--zen-cyan-glow)'}">${multa.nombre}</p>
        <p class="text-[10px]" style="color:var(--zen-text-faint)">${p.multa_dias || 0} día(s) de multa</p>
      </div>
    </div>

    <div class="glass-card p-4 mb-4">
      <div class="flex items-center justify-between mb-2">
        <p class="font-display text-[11px] tracking-wider" style="color:var(--zen-text-dim)">LÍMITE DE INFLACIÓN</p>
        <p class="text-xs" style="color:var(--zen-text-dim)">${valorLibre} / ${ZENIT_CONFIG.INFLACION_LIMITE_LIBRE} pts</p>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pctInflacion}%;background:${pctInflacion >= 100 ? 'var(--zen-gold)' : 'linear-gradient(90deg, var(--zen-purple), var(--zen-cyan))'}"></div>
      </div>
      <p class="text-xs mt-2" style="color:var(--zen-text-faint)">Guarda en el banco para evitar que tu cartera dispare los precios</p>
    </div>

    <button onclick="cerrarJornada()" class="btn-zenit btn-red w-full">
      <i class="ti ti-moon-stars" style="font-size:16px"></i>
      Cerrar jornada
    </button>
  </div>`;
}

function vistaMoneda() {
  const p = STATE.perfil;
  return `
  <div class="max-w-5xl mx-auto px-4 py-5 fadeUp">
    <div class="text-center mb-5">
      <p class="font-display text-base text-glow-gold" style="color:var(--zen-gold-glow)">CASA DE LA MONEDA</p>
      <p class="text-xs mt-1" style="color:var(--zen-text-dim)">Gestiona tu economía Zenit</p>
    </div>

    ${barraInventario()}

    <div class="glass-card p-4 mb-4 neon-border-cyan">
      <p class="font-display text-[11px] tracking-wider mb-3" style="color:var(--zen-cyan-glow)"><i class="ti ti-building-bank" style="font-size:13px;vertical-align:-1px"></i> BANCO BLINDADO</p>
      <p class="font-display text-3xl mb-1" style="color:var(--zen-cyan-glow)">${p.banco || 0} pts</p>
      <p class="text-xs mb-4" style="color:var(--zen-text-faint)">Estos puntos no cuentan para la inflación</p>
      <div class="flex gap-2">
        <input id="banco-amount" type="number" min="1" placeholder="Cantidad" class="input-zenit flex-1" style="font-size:14px">
        <button onclick="depositarBanco(parseInt(document.getElementById('banco-amount').value)||0)" class="btn-zenit btn-cyan" style="padding:10px 14px">
          <i class="ti ti-arrow-down" style="font-size:15px"></i>
        </button>
        <button onclick="retirarBanco(parseInt(document.getElementById('banco-amount').value)||0)" class="btn-zenit btn-ghost" style="padding:10px 14px">
          <i class="ti ti-arrow-up" style="font-size:15px"></i>
        </button>
      </div>
    </div>

    <div class="glass-card p-4 mb-4 neon-border-purple">
      <p class="font-display text-[11px] tracking-wider mb-3" style="color:var(--zen-purple-glow)"><i class="ti ti-flame" style="font-size:13px;vertical-align:-1px"></i> FORJAR DIVISAS</p>
      <p class="text-xs mb-3" style="color:var(--zen-text-faint)">Cambia monedas bajas por altas</p>
      <div class="flex flex-col gap-2">
        <button onclick="forjarMoneda('bronce_a_plata')" class="mission-row flex items-center justify-between">
          <span class="flex items-center gap-2 text-sm"><img src="${coinSrc('coin_bronze')}" class="coin-img-sm"> × ${ZENIT_CONFIG.COSTE_FORJA_BRONCE_A_PLATA} <i class="ti ti-arrow-right" style="font-size:13px"></i> <img src="${coinSrc('coin_silver')}" class="coin-img-sm"> × 1</span>
          <i class="ti ti-chevron-right" style="color:var(--zen-text-faint)"></i>
        </button>
        <button onclick="forjarMoneda('plata_a_oro')" class="mission-row flex items-center justify-between">
          <span class="flex items-center gap-2 text-sm"><img src="${coinSrc('coin_silver')}" class="coin-img-sm"> × ${ZENIT_CONFIG.COSTE_FORJA_PLATA_A_ORO} <i class="ti ti-arrow-right" style="font-size:13px"></i> <img src="${coinSrc('coin_gold')}" class="coin-img-sm"> × 1</span>
          <i class="ti ti-chevron-right" style="color:var(--zen-text-faint)"></i>
        </button>
        <button onclick="forjarMoneda('bronce_a_oro')" class="mission-row flex items-center justify-between">
          <span class="flex items-center gap-2 text-sm"><img src="${coinSrc('coin_bronze')}" class="coin-img-sm"> × ${ZENIT_CONFIG.COSTE_FORJA_BRONCE_A_ORO} <i class="ti ti-arrow-right" style="font-size:13px"></i> <img src="${coinSrc('coin_gold')}" class="coin-img-sm"> × 1</span>
          <i class="ti ti-chevron-right" style="color:var(--zen-text-faint)"></i>
        </button>
      </div>
    </div>

    <div class="glass-card p-4 mb-4">
      <p class="font-display text-[11px] tracking-wider mb-3" style="color:var(--zen-text-dim)"><i class="ti ti-cut" style="font-size:13px;vertical-align:-1px"></i> FRACCIONAR DIVISAS</p>
      <p class="text-xs mb-3" style="color:var(--zen-text-faint)">Obtén cambio suelto</p>
      <div class="flex flex-col gap-2">
        <button onclick="fraccionarMoneda('plata_a_bronce')" class="mission-row flex items-center justify-between">
          <span class="flex items-center gap-2 text-sm"><img src="${coinSrc('coin_silver')}" class="coin-img-sm"> × 1 <i class="ti ti-arrow-right" style="font-size:13px"></i> <img src="${coinSrc('coin_bronze')}" class="coin-img-sm"> × 3</span>
          <i class="ti ti-chevron-right" style="color:var(--zen-text-faint)"></i>
        </button>
        <button onclick="fraccionarMoneda('oro_a_plata')" class="mission-row flex items-center justify-between">
          <span class="flex items-center gap-2 text-sm"><img src="${coinSrc('coin_gold')}" class="coin-img-sm"> × 1 <i class="ti ti-arrow-right" style="font-size:13px"></i> <img src="${coinSrc('coin_silver')}" class="coin-img-sm"> × 1 + <img src="${coinSrc('coin_bronze')}" class="coin-img-sm"> × 2</span>
          <i class="ti ti-chevron-right" style="color:var(--zen-text-faint)"></i>
        </button>
        <button onclick="fraccionarMoneda('oro_a_bronce')" class="mission-row flex items-center justify-between">
          <span class="flex items-center gap-2 text-sm"><img src="${coinSrc('coin_gold')}" class="coin-img-sm"> × 1 <i class="ti ti-arrow-right" style="font-size:13px"></i> <img src="${coinSrc('coin_bronze')}" class="coin-img-sm"> × 5</span>
          <i class="ti ti-chevron-right" style="color:var(--zen-text-faint)"></i>
        </button>
      </div>
    </div>
  </div>`;
}

function bloqueMisiones(titulo, rango, lista, coinKey, color) {
  const tareasDelRango = STATE.tareas.filter(t => t.rango === rango);

  return `
  <div class="glass-card p-4 mb-4 neon-border-${color}">
    <div class="flex items-center justify-between mb-3">
      <div class="flex items-center gap-2">
        <img src="${coinSrc(coinKey)}" class="coin-img-sm">
        <p class="font-display text-[11px] tracking-wider" style="color:var(--zen-text-dim)">${titulo}</p>
      </div>
      <span class="badge-rank badge-${rango === 'bronce' ? 'bronze' : rango}">+1 ${rango}</span>
    </div>
    <div class="flex flex-col gap-2">
      ${lista.map(m => {
        const existente = tareasDelRango.find(t => t.texto === m.texto);
        const done = existente?.completada || false;
        return `
        <div class="mission-row flex items-center gap-3 ${done ? 'done' : ''}" onclick="${existente ? `handleMisionClick(${existente.id}, ${done})` : `crearYCompletarMision('${m.texto.replace(/'/g, "\\'")}', '${rango}', '${m.cat}')`}">
          <div class="checkbox-zenit ${done ? 'checked' : ''}">
            ${done ? '<i class="ti ti-check" style="color:#fff;font-size:14px"></i>' : ''}
          </div>
          <span class="mission-text text-sm flex-1" style="color:var(--zen-text)">${m.texto}</span>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

async function crearYCompletarMision(texto, rango, cat) {
  const tarea = await crearTarea(texto, rango, cat);
  if (tarea) await completarTarea(tarea);
}

async function handleMisionClick(tareaId, done) {
  if (done) { toast("Esta misión ya está completada hoy", "info", "ti-info-circle"); return; }
  const tarea = STATE.tareas.find(t => t.id === tareaId);
  if (tarea) await completarTarea(tarea);
}

function vistaMisiones() {
  return `
  <div class="max-w-5xl mx-auto px-4 py-5 fadeUp">
    <div class="text-center mb-5">
      <p class="font-display text-base" style="color:var(--zen-text)">MISIONES DIARIAS</p>
      <p class="text-xs mt-1" style="color:var(--zen-text-dim)">${hoyISO()}</p>
    </div>

    ${bloqueMisiones("RANGO BRONCE", "bronce", ZENIT_CONFIG.MISIONES_BRONCE, "coin_bronze", "purple")}
    ${bloqueMisiones("RANGO PLATA", "plata", ZENIT_CONFIG.MISIONES_PLATA, "coin_silver", "cyan")}
    ${bloqueMisiones("RANGO ORO", "oro", ZENIT_CONFIG.MISIONES_ORO, "coin_gold", "gold")}
  </div>`;
}

function vistaTienda() {
  const p = STATE.perfil;
  const valorLibre = (p.coin_bronze || 0) * 1 + (p.coin_silver || 0) * 3 + (p.coin_gold || 0) * 5;
  const multa = nivelMulta(p.multa_dias || 0);
  const bancarrota = multa.nombre === "BANCARROTA";

  const items = [
    { id: "videojuego", nombre: "Sesión de videojuegos", icon: "ti-device-gamepad-2", base: ZENIT_CONFIG.PRECIO_VIDEOJUEGO },
    { id: "serie30", nombre: "Episodio de serie (30 min)", icon: "ti-device-tv", base: ZENIT_CONFIG.PRECIO_SERIE_30 },
    { id: "serie60", nombre: "Episodio de serie (60 min)", icon: "ti-device-tv", base: ZENIT_CONFIG.PRECIO_SERIE_60 },
    { id: "tardelibre", nombre: "Tarde libre / salir de fiesta", icon: "ti-confetti", base: ZENIT_CONFIG.PRECIO_TARDE_LIBRE }
  ];

  return `
  <div class="max-w-5xl mx-auto px-4 py-5 fadeUp">
    <div class="text-center mb-5">
      <p class="font-display text-base text-glow-gold" style="color:var(--zen-gold-glow)">TIENDA DE RECOMPENSAS</p>
      <p class="text-xs mt-1" style="color:var(--zen-text-dim)">Valor total de cartera: ${valorLibre} pts</p>
    </div>

    ${bancarrota ? `
    <div class="glass-card p-4 mb-4 neon-border-red text-center">
      <i class="ti ti-lock" style="color:#FCA5A5;font-size:24px"></i>
      <p class="font-display text-sm mt-2" style="color:#FCA5A5">TIENDA BLOQUEADA</p>
      <p class="text-xs mt-1" style="color:var(--zen-text-dim)">Estás en bancarrota. Completa misiones para reducir tu multa</p>
    </div>` : ''}

    ${multa.nombre !== "LIMPIO" && !bancarrota ? `
    <div class="glass-card p-3 mb-4" style="background:rgba(240,180,51,0.06);border-color:rgba(240,180,51,0.3)">
      <p class="text-xs flex items-center gap-2" style="color:var(--zen-gold-glow)"><i class="ti ti-alert-triangle" style="font-size:14px"></i> Precios aumentados por multa: ${multa.nombre}</p>
    </div>` : ''}

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
      ${items.map(item => {
        const precioFinal = precioConInflacion(item.base);
        const inflado = precioFinal > item.base;
        return `
        <div class="glass-card p-4 ${bancarrota ? 'opacity-40' : ''}">
          <div class="flex items-center gap-2 mb-3">
            <i class="ti ${item.icon}" style="color:var(--zen-purple-glow);font-size:20px"></i>
            <p class="text-sm" style="color:var(--zen-text)">${item.nombre}</p>
          </div>
          <p class="font-display text-2xl mb-3 ${inflado ? 'text-glow-gold' : ''}" style="color:${inflado ? 'var(--zen-gold-glow)' : 'var(--zen-text)'}">
            ${precioFinal} pts ${inflado ? `<span class="text-xs" style="color:var(--zen-text-faint);text-decoration:line-through">${item.base}</span>` : ''}
          </p>
          <button onclick="comprarRecompensa({nombre:'${item.nombre}', base:${item.base}})" class="btn-zenit btn-purple w-full" ${bancarrota ? 'disabled' : ''}>
            <i class="ti ti-shopping-cart" style="font-size:14px"></i>
            Canjear
          </button>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function nombreMes(m) {
  const meses = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  return meses[m];
}

function cambiarMes(delta) {
  STATE.calendarMonth += delta;
  if (STATE.calendarMonth > 11) { STATE.calendarMonth = 0; STATE.calendarYear++; }
  if (STATE.calendarMonth < 0) { STATE.calendarMonth = 11; STATE.calendarYear--; }
  render();
}

function seleccionarDia(key) {
  STATE.calendarSelected = STATE.calendarSelected === key ? null : key;
  render();
}

function vistaCalendario() {
  const y = STATE.calendarYear, m = STATE.calendarMonth;
  const primerDia = new Date(y, m, 1).getDay();
  const offset = primerDia === 0 ? 6 : primerDia - 1;
  const diasMes = new Date(y, m + 1, 0).getDate();
  const hoy = new Date();
  const hoyKey = eventKey(hoy.getFullYear(), hoy.getMonth(), hoy.getDate());

  let celdas = [];
  for (let i = 0; i < offset; i++) celdas.push(null);
  for (let d = 1; d <= diasMes; d++) celdas.push(d);

  const selKey = STATE.calendarSelected;
  const eventosSel = selKey ? (STATE.calendarEvents[selKey] || []) : [];

  return `
  <div class="max-w-5xl mx-auto px-4 py-5 fadeUp">
    <div class="text-center mb-5">
      <p class="font-display text-base" style="color:var(--zen-text)">CALENDARIO</p>
      <p class="text-xs mt-1" style="color:var(--zen-text-dim)">Planifica tus bloques de estudio y conducción</p>
    </div>

    <div class="glass-card p-4 mb-4">
      <div class="flex items-center justify-between mb-2">
        <button onclick="connectGoogleCalendar()" class="btn-zenit btn-ghost" style="padding:8px 12px;font-size:10px">
          <i class="ti ti-brand-google" style="font-size:13px"></i> Sincronizar con Google
        </button>
        <span class="text-[10px]" style="color:var(--zen-text-faint)">${STATE.googleCalendarConnected ? 'Conectado' : 'No conectado'}</span>
      </div>
    </div>

    <div class="glass-card p-4 mb-4">
      <div class="flex items-center justify-between mb-4">
        <button onclick="cambiarMes(-1)" class="btn-zenit btn-ghost" style="padding:6px 10px"><i class="ti ti-chevron-left" style="font-size:15px"></i></button>
        <p class="font-display text-sm" style="color:var(--zen-purple-glow)">${nombreMes(m)} ${y}</p>
        <button onclick="cambiarMes(1)" class="btn-zenit btn-ghost" style="padding:6px 10px"><i class="ti ti-chevron-right" style="font-size:15px"></i></button>
      </div>
      <div class="grid grid-cols-7 gap-1 mb-1">
        ${["L","M","X","J","V","S","D"].map(d => `<div class="text-center text-[10px] py-1" style="color:var(--zen-text-faint)">${d}</div>`).join('')}
      </div>
      <div class="grid grid-cols-7 gap-1">
        ${celdas.map(d => {
          if (!d) return `<div></div>`;
          const key = eventKey(y, m, d);
          const isToday = key === hoyKey;
          const hasEvent = (STATE.calendarEvents[key] || []).length > 0;
          const isSelected = key === selKey;
          return `<div class="calendar-day ${isToday ? 'today' : ''} ${hasEvent ? 'has-event' : ''} ${isSelected ? 'selected' : ''}" style="color:var(--zen-text)" onclick="seleccionarDia('${key}')">${d}</div>`;
        }).join('')}
      </div>
    </div>

    ${selKey ? `
    <div class="glass-card p-4 neon-border-purple">
      <p class="font-display text-[11px] tracking-wider mb-3" style="color:var(--zen-purple-glow)">${selKey}</p>
      <div class="flex flex-col gap-2 mb-4">
        ${eventosSel.length === 0 ? `<p class="text-xs" style="color:var(--zen-text-faint)">Sin eventos este día</p>` : eventosSel.map(e => `
          <div class="flex items-center justify-between mission-row" style="cursor:default">
            <div>
              <p class="text-sm" style="color:var(--zen-text)">${e.titulo}</p>
              <p class="text-[10px]" style="color:var(--zen-text-faint)">${e.hora || 'Todo el día'}</p>
            </div>
            <button onclick="deleteCalendarEvent('${selKey}', ${e.id})" class="btn-zenit btn-ghost" style="padding:6px 8px">
              <i class="ti ti-trash" style="font-size:13px;color:#FCA5A5"></i>
            </button>
          </div>
        `).join('')}
      </div>
      <div class="flex gap-2">
        <input id="evento-titulo" type="text" placeholder="Nuevo evento..." class="input-zenit flex-1" style="font-size:13px">
        <input id="evento-hora" type="time" class="input-zenit" style="font-size:13px;width:110px">
        <button onclick="addCalendarEvent('${selKey}', document.getElementById('evento-titulo').value, document.getElementById('evento-hora').value)" class="btn-zenit btn-purple" style="padding:10px 14px">
          <i class="ti ti-plus" style="font-size:15px"></i>
        </button>
      </div>
    </div>` : `
    <div class="text-center py-6">
      <i class="ti ti-calendar-event" style="color:var(--zen-text-faint);font-size:28px"></i>
      <p class="text-xs mt-2" style="color:var(--zen-text-faint)">Selecciona un día para añadir eventos</p>
    </div>`}
  </div>`;
}

function render() {
  const root = document.getElementById("app-root");

  if (STATE.loading) {
    root.innerHTML = vistaLoading();
    return;
  }

  if (!STATE.session) {
    root.innerHTML = vistaLogin();
    return;
  }

  if (!STATE.perfil) {
    root.innerHTML = vistaCreadorPersonaje();
    return;
  }

  let contenido = "";
  if (STATE.vista === "dashboard") contenido = vistaDashboard();
  else if (STATE.vista === "moneda") contenido = vistaMoneda();
  else if (STATE.vista === "misiones") contenido = vistaMisiones();
  else if (STATE.vista === "tienda") contenido = vistaTienda();
  else if (STATE.vista === "calendario") contenido = vistaCalendario();

  root.innerHTML = navbar() + contenido;
}

async function initApp() {
  STATE.loading = true;
  render();

  await ensureAssetsUploaded();

  const { data: { session } } = await sb.auth.getSession();
  STATE.session = session;

  if (session) {
    const perfil = await cargarPerfil();
    STATE.perfil = perfil;
    if (perfil) {
      STATE.tareas = await cargarTareasHoy();
    }
  }

  STATE.loading = false;
  render();

  sb.auth.onAuthStateChange(async (event, newSession) => {
    STATE.session = newSession;
    if (newSession && !STATE.perfil) {
      const perfil = await cargarPerfil();
      STATE.perfil = perfil;
      if (perfil) {
        STATE.tareas = await cargarTareasHoy();
      }
    }
    if (!newSession) {
      STATE.perfil = null;
      STATE.tareas = [];
    }
    render();
  });
}

initApp();

</script>
</body>
</html>
